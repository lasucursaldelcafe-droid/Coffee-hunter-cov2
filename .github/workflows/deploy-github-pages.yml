name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build sitio estático
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm ci
          node scripts/build-github-pages.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Publicar en línea
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verificar sitio publicado
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "🌐 URL pública: $URL"
          for path in "" "catalogo/" "tiendas/" "crear-tienda/" "logistica/"; do
            CODE=$(curl -sL -o /dev/null -w "%{http_code}" "${URL}${path}")
            echo "${URL}${path} → HTTP $CODE"
          done
