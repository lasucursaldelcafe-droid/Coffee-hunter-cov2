name: Preview Vercel (PR)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      EXPECTED_PROJECT: colombia-green-coffee
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validar build
        run: npm run ci:validate

      - name: Comprobar credenciales Vercel
        id: creds
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Preview omitido — configura secrets Vercel para previews automáticos."
          fi

      - name: Verificar proyecto Vercel correcto
        if: steps.creds.outputs.ready == 'true'
        run: |
          PROJECT=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            | jq -r .name)
          echo "Proyecto Vercel: $PROJECT (esperado: $EXPECTED_PROJECT)"
          if [ "$PROJECT" != "$EXPECTED_PROJECT" ]; then
            echo "::error::VERCEL_PROJECT_ID apunta a '$PROJECT', no a '$EXPECTED_PROJECT'."
            echo "Ejecuta en tu PC: npm run setup:vercel && npm run setup:github-secrets"
            exit 1
          fi

      - name: Pull configuración Vercel
        if: steps.creds.outputs.ready == 'true'
        run: npx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build preview
        if: steps.creds.outputs.ready == 'true'
        run: npx vercel@latest build --token="$VERCEL_TOKEN"

      - name: Desplegar preview
        if: steps.creds.outputs.ready == 'true'
        id: deploy
        run: |
          URL=$(npx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview: $URL"

      - name: Comentar URL en el PR
        if: steps.creds.outputs.ready == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            if (!url) return;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview Vercel: ${url}`
            });
